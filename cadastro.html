<!doctype html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcquaSafe – Cadastro</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="h-full w-full bg-[#0a0f1a] text-white overflow-auto">

<div class="h-full w-full flex flex-col items-center justify-center px-4 py-8">

    <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                <i data-lucide="droplets" class="w-7 h-7 text-white"></i>
            </div>
            <span class="text-2xl font-bold gradient-text">AcquaSafe</span>
        </div>
        <h1 class="text-3xl font-bold mb-3">Crie sua conta</h1>
        <p class="text-slate-400">Cadastre-se para monitorar em tempo real</p>
    </div>

    <div class="w-full max-w-md">
        <div class="glass-card glow-border rounded-2xl p-8 space-y-6">
            <form class="space-y-5" id="formCadastro">
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Nome Completo</label>
                    <input type="text" id="cad-nome" placeholder="Seu nome completo"
                           class="input-field w-full px-4 py-3 rounded-lg text-white" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Email ou CPF</label>
                    <input type="text" id="cad-login" placeholder="seu.email@exemplo.com ou CPF"
                           class="input-field w-full px-4 py-3 rounded-lg text-white" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Senha</label>
                    <input type="password" id="cad-senha" placeholder="••••••••"
                           class="input-field w-full px-4 py-3 rounded-lg text-white" required>
                </div>

                <button type="submit"
                        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-semibold py-3 rounded-lg transition-all transform hover:scale-[1.02]">
                    Finalizar Cadastro
                </button>
            </form>

            <!-- Botões de Ação -->
            <div class="flex gap-3 pt-4">
                <a href="login.html"
                   class="flex-1 text-center border border-white/30 hover:bg-white/10 text-white font-semibold py-3 rounded-lg transition-all">
                    Voltar para Login
                </a>
                <a href="pagamento.html"
                   class="flex-1 text-center bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-white font-semibold py-3 rounded-lg transition-all">
                    Assinar Plano
                </a>
            </div>
        </div>
    </div>

</div>

<script src="login.js"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
