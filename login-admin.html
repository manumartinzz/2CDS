<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcquaSafe – Admin Login</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        #toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.875rem; font-weight: 500;
            backdrop-filter: blur(12px);
            transition: all 0.35s;
            opacity: 0; z-index: 9999; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body class="admin-bg">

<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 right-0 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>
</div>

<div class="relative min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                    <i data-lucide="shield" class="w-8 h-8 text-white"></i>
                </div>
                <span class="text-3xl font-bold gradient-text">AcquaSafe</span>
            </div>
            <h1 class="text-3xl font-bold">Painel Administrativo</h1>
            <p class="text-white/60 mt-2">Acesso restrito a administradores</p>
        </div>

        <div class="glass-card glow-border rounded-2xl p-8">
            <form onsubmit="loginAdmin(event)" class="space-y-5">
                <div>
                    <label class="block mb-2 text-sm font-medium">E-mail</label>
                    <input type="email" id="admin-email" 
                           class="input-field w-full px-4 py-3 rounded-lg" 
                           placeholder="milenakachimarck@gmail.com" required>
                </div>
                <div>
                    <label class="block mb-2 text-sm font-medium">Senha</label>
                    <input type="password" id="admin-senha" 
                           class="input-field w-full px-4 py-3 rounded-lg" 
                           placeholder="••••••••" required>
                </div>

                <button type="submit" class="w-full btn-gradient py-3 rounded-lg font-semibold">
                    Entrar no Painel
                </button>
            </form>

            <div id="login-error" class="hidden mt-4 text-center text-red-400 text-sm font-medium bg-red-500/10 border border-red-500/30 rounded-lg py-2 px-4">
                E-mail ou senha incorretos.
            </div>

            <p class="text-center text-white/50 text-sm mt-6">
                <a href="login.html" class="hover:text-cyan-400 transition-colors">← Voltar ao login principal</a>
            </p>
        </div>
    </div>
</div>

<script src="login.js"></script>
<script>
    lucide.createIcons();

    function loginAdmin(e) {
        e.preventDefault();

        const email = document.getElementById('admin-email').value.trim().toLowerCase();
        const senha = document.getElementById('admin-senha').value.trim();
        const errorEl = document.getElementById('login-error');

        const userFound = adminUsers.find(user => 
            user.email.toLowerCase() === email && user.senha === senha
        );

        if (userFound) {
            sessionStorage.setItem('adminLogado', 'true');
            sessionStorage.setItem('adminUsuario', userFound.email);
            sessionStorage.setItem('adminNome', userFound.nome);

            errorEl.classList.add('hidden');
            showToast('Login realizado com sucesso! Redirecionando...', 'success');
            
            setTimeout(() => {
                window.location.href = 'admin-clientes.html';
            }, 900);
        } else {
            errorEl.classList.remove('hidden');
        }
    }

    function showToast(msg, tipo) {
        const toast = document.createElement('div');
        toast.id = 'toast';
        toast.textContent = msg;
        toast.className = `show ${tipo === 'success' ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300' : 'bg-red-500/20 border-red-500 text-red-300'}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
</body>
</html>
