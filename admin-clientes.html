<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcquaSafe – Clientes</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        body { font-family: 'DM Sans', sans-serif; }

        .table-row {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s;
        }
        .table-row:hover { background: rgba(255,255,255,0.04); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .badge-ativo   { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
        .badge-bloq    { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
        .badge-pend    { background: rgba(234,179,8,0.15);  color: #fde047; border: 1px solid rgba(234,179,8,0.3); }

        .input-search {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            border-radius: 0.6rem;
            padding: 0.55rem 1rem 0.55rem 2.5rem;
            outline: none;
            width: 100%;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }
        .input-search::placeholder { color: rgba(255,255,255,0.35); }
        .input-search:focus { border-color: rgba(6,182,212,0.5); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-box {
            background: #0f1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.25rem;
            padding: 2rem;
            width: 100%; max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.25s;
        }
        .modal-overlay.open .modal-box { transform: translateY(0); }

        .field-label { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .field-value { font-size: 0.95rem; color: #fff; font-weight: 500; }
        .field-group { margin-bottom: 1rem; }
    </style>
</head>
<body class="admin-bg min-h-screen">

<!-- Guard: redireciona se não estiver logado -->
<script>
    if (sessionStorage.getItem('adminLogado') !== 'true') {
        alert('Acesso negado. Faça login como administrador.');
        window.location.href = 'login-admin.html';
    }
</script>

<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 right-0 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>
</div>

<!-- Navbar -->
<header class="relative z-10 border-b border-white/10 backdrop-blur-sm bg-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
                <i data-lucide="shield" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xl font-bold gradient-text">AcquaSafe</span>
            <span class="text-white/30 mx-2">/</span>
            <span class="text-white/70 text-sm">Clientes</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="admin-doencas.html"
               class="text-xs text-white/60 hover:text-blue-400 transition-colors flex items-center gap-1">
                <i data-lucide="shield-alert" class="w-4 h-4"></i> Doenças
            </a>
            <a href="admin-bloqueios.html"
               class="text-xs text-white/60 hover:text-red-400 transition-colors flex items-center gap-1">
                <i data-lucide="ban" class="w-4 h-4"></i> Bloqueios
            </a>
            <button onclick="sair()"
                    class="text-xs text-white/50 hover:text-white transition-colors flex items-center gap-1 ml-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </div>
    </div>
</header>

<main class="relative z-10 max-w-7xl mx-auto px-6 py-8">

    <!-- Cabeçalho da seção -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-2xl font-bold">Lista de Clientes</h2>
            <p class="text-white/50 text-sm mt-1">Visualize e gerencie todos os clientes cadastrados.</p>
        </div>
        <div class="flex items-center gap-3">
            <span id="total-badge" class="badge badge-ativo">0 clientes</span>
        </div>
    </div>

    <!-- Barra de busca + filtros -->
    <div class="glass-card rounded-xl p-4 mb-6 flex flex-col sm:flex-row gap-3 items-center">
        <div class="relative flex-1 w-full">
            <i data-lucide="search" class="w-4 h-4 text-white/40 absolute left-3 top-1/2 -translate-y-1/2"></i>
            <input type="text" id="busca" class="input-search" placeholder="Buscar por nome, CPF ou e-mail…"
                   oninput="renderTabela()">
        </div>
        <select id="filtro-status" onchange="renderTabela()"
                class="input-search sm:w-44 pl-3">
            <option value="">Todos os status</option>
            <option value="ativo">Ativo</option>
            <option value="bloqueado">Bloqueado</option>
            <option value="pendente">Pendente</option>
        </select>
    </div>

    <!-- Tabela -->
    <div class="glass-card rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-white/10 text-white/50 text-xs uppercase tracking-wider">
                        <th class="px-5 py-4 text-left">Nome</th>
                        <th class="px-5 py-4 text-left">CPF</th>
                        <th class="px-5 py-4 text-left">E-mail</th>
                        <th class="px-5 py-4 text-left">Telefone</th>
                        <th class="px-5 py-4 text-left">Plano</th>
                        <th class="px-5 py-4 text-left">Status</th>
                        <th class="px-5 py-4 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    <!-- preenchido via JS -->
                </tbody>
            </table>
        </div>
        <div id="empty-state" class="hidden text-center py-16 text-white/40">
            <i data-lucide="users" class="w-10 h-10 mx-auto mb-3 opacity-40"></i>
            <p>Nenhum cliente encontrado.</p>
        </div>
    </div>
</main>

<!-- Modal de detalhes do cliente -->
<div id="modal" class="modal-overlay" onclick="fecharModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-lg font-bold">Detalhes do Cliente</h3>
            <button onclick="fecharModal()" class="text-white/40 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="modal-content"></div>
        <div class="flex gap-3 mt-6">
            <button id="btn-bloquear" onclick="toggleBloqueio()"
                    class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-colors"></button>
            <button onclick="fecharModal()"
                    class="flex-1 py-2.5 rounded-lg text-sm font-semibold bg-white/10 hover:bg-white/15 transition-colors">
                Fechar
            </button>
        </div>
    </div>
</div>

<script>
lucide.createIcons();

// ── Dados de exemplo ──────────────────────────────────────────────────────────
// Substitua por chamada à API/banco de dados conforme necessário
let clientes = JSON.parse(localStorage.getItem('acqua_clientes') || 'null') || [
    { id: 1, nome: 'Ana Paula Ferreira',  cpf: '123.456.789-00', email: 'ana@email.com',    tel: '(11) 98765-4321', plano: 'Premium', status: 'ativo'     },
    { id: 2, nome: 'Carlos Mendes',       cpf: '234.567.890-11', email: 'carlos@email.com', tel: '(21) 91234-5678', plano: 'Básico',  status: 'pendente'  },
    { id: 3, nome: 'Fernanda Lima',       cpf: '345.678.901-22', email: 'fer@email.com',    tel: '(31) 99876-5432', plano: 'Premium', status: 'ativo'     },
    { id: 4, nome: 'João Victor Santos',  cpf: '456.789.012-33', email: 'joao@email.com',   tel: '(41) 97654-3210', plano: 'Básico',  status: 'bloqueado' },
    { id: 5, nome: 'Mariana Costa',       cpf: '567.890.123-44', email: 'mari@email.com',   tel: '(51) 96543-2109', plano: 'Premium', status: 'ativo'     },
    { id: 6, nome: 'Roberto Alves',       cpf: '678.901.234-55', email: 'rob@email.com',    tel: '(61) 95432-1098', plano: 'Básico',  status: 'pendente'  },
];

let clienteAtivo = null;

function salvar() {
    localStorage.setItem('acqua_clientes', JSON.stringify(clientes));
}

// ── Renderização da tabela ────────────────────────────────────────────────────
function renderTabela() {
    const busca  = document.getElementById('busca').value.toLowerCase();
    const filtro = document.getElementById('filtro-status').value;

    const filtrados = clientes.filter(c => {
        const match = c.nome.toLowerCase().includes(busca) ||
                      c.cpf.includes(busca) ||
                      c.email.toLowerCase().includes(busca);
        const statusOk = !filtro || c.status === filtro;
        return match && statusOk;
    });

    const tbody = document.getElementById('tabela-body');
    const empty = document.getElementById('empty-state');

    document.getElementById('total-badge').textContent =
        clientes.length + (clientes.length === 1 ? ' cliente' : ' clientes');

    if (filtrados.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        lucide.createIcons();
        return;
    }
    empty.classList.add('hidden');

    tbody.innerHTML = filtrados.map(c => `
        <tr class="table-row">
            <td class="px-5 py-3.5 font-medium">${c.nome}</td>
            <td class="px-5 py-3.5 text-white/60">${c.cpf}</td>
            <td class="px-5 py-3.5 text-white/60">${c.email}</td>
            <td class="px-5 py-3.5 text-white/60">${c.tel}</td>
            <td class="px-5 py-3.5">${c.plano}</td>
            <td class="px-5 py-3.5">${badgeStatus(c.status)}</td>
            <td class="px-5 py-3.5 text-center">
                <button onclick="abrirModal(${c.id})"
                        class="text-cyan-400 hover:text-cyan-300 transition-colors text-xs font-semibold">
                    Ver detalhes
                </button>
            </td>
        </tr>
    `).join('');
    lucide.createIcons();
}

function badgeStatus(s) {
    const map = {
        ativo:     '<span class="badge badge-ativo">● Ativo</span>',
        bloqueado: '<span class="badge badge-bloq">● Bloqueado</span>',
        pendente:  '<span class="badge badge-pend">● Pendente</span>',
    };
    return map[s] || s;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function abrirModal(id) {
    clienteAtivo = clientes.find(c => c.id === id);
    if (!clienteAtivo) return;

    document.getElementById('modal-content').innerHTML = `
        <div class="grid grid-cols-2 gap-x-6">
            <div class="field-group">
                <p class="field-label">Nome completo</p>
                <p class="field-value">${clienteAtivo.nome}</p>
            </div>
            <div class="field-group">
                <p class="field-label">CPF</p>
                <p class="field-value">${clienteAtivo.cpf}</p>
            </div>
            <div class="field-group">
                <p class="field-label">E-mail</p>
                <p class="field-value">${clienteAtivo.email}</p>
            </div>
            <div class="field-group">
                <p class="field-label">Telefone</p>
                <p class="field-value">${clienteAtivo.tel}</p>
            </div>
            <div class="field-group">
                <p class="field-label">Plano</p>
                <p class="field-value">${clienteAtivo.plano}</p>
            </div>
            <div class="field-group">
                <p class="field-label">Status atual</p>
                <p class="field-value">${badgeStatus(clienteAtivo.status)}</p>
            </div>
        </div>
    `;

    const btn = document.getElementById('btn-bloquear');
    if (clienteAtivo.status === 'bloqueado') {
        btn.textContent = 'Desbloquear cliente';
        btn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold bg-green-500/20 hover:bg-green-500/30 text-green-300 transition-colors';
    } else {
        btn.textContent = 'Bloquear cliente';
        btn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold bg-red-500/20 hover:bg-red-500/30 text-red-300 transition-colors';
    }

    document.getElementById('modal').classList.add('open');
    lucide.createIcons();
}

function fecharModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('open');
    clienteAtivo = null;
}

function toggleBloqueio() {
    if (!clienteAtivo) return;
    const c = clientes.find(x => x.id === clienteAtivo.id);
    c.status = c.status === 'bloqueado' ? 'ativo' : 'bloqueado';
    salvar();
    fecharModal();
    renderTabela();
}

// ── Sair ──────────────────────────────────────────────────────────────────────
function sair() {
    sessionStorage.removeItem('adminLogado');
    sessionStorage.removeItem('adminUsuario');
    window.location.href = 'login-admin.html';
}

// Init
renderTabela();
</script>
</body>
</html>
