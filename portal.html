<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal GitHub</title>
    <link rel="stylesheet" href="portal.css">
</head>
<body>

    <div class="container">
        <h1>Bem-vindo ao Portal</h1>
        <p>Abaixo estão alguns exemplos de ícones renderizados pelo Lucide:</p>
        
        <div class="icones">
            <i data-lucide="activity"></i>
            <i data-lucide="airplay"></i>
            <i data-lucide="alarm-clock"></i>
            <i data-lucide="bell"></i>
        </div>
    </div>

    <script src="portal.js"></script>
    <script>
        // Inicializa os ícones do Lucide na página
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
