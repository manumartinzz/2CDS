<!doctype html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcquaSafe - Painel de Controle</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-full bg-[#0a0f1a] text-white overflow-auto">

  <!-- Navbar -->
  <header class="w-full px-6 py-4 flex items-center justify-between border-b border-white/10 bg-[#0a0f1a]/95 backdrop-blur-md">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
        <i data-lucide="droplets" class="w-5 h-5 text-white"></i>
      </div>
      <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">
        AcquaSafe
      </span>
    </div>

    <div class="flex items-center gap-4">
      <a href="pagamento.html" 
         class="flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 px-5 py-2.5 rounded-2xl font-semibold text-sm transition-all hover:scale-105">
        <i data-lucide="credit-card" class="w-4 h-4"></i>
        <span>Assinar Plano</span>
      </a>
      <button onclick="window.location.href='index.html'" 
              class="px-4 py-2 text-sm text-red-400 hover:text-red-300 transition-colors">
        Sair
      </button>
    </div>
  </header>

  <div class="flex-1 w-full max-w-6xl mx-auto px-4 sm:px-6 py-8">

    <!-- Header Section -->
    <section class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold text-white">Painel de Controle</h1>
        <p class="text-slate-400">Monitoramento técnico e parâmetros de referência</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
          Sistema Ativo
        </span>
      </div>
    </section>

    <!-- Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Chart -->
      <div class="lg:col-span-2 glass-card glow-border rounded-3xl p-6">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-semibold text-lg flex items-center gap-2">
            <i data-lucide="bar-chart-3" class="w-5 h-5 text-cyan-400"></i>
            Parâmetros de Qualidade
          </h3>
          <span class="text-xs text-slate-500">Atualizado agora</span>
        </div>
        <div class="h-[320px]">
          <canvas id="qualityChart"></canvas>
        </div>
      </div>

      <!-- Sidebar Cards -->
      <aside class="flex flex-col gap-4">

        <div onclick="window.location.href='patógenos.html'" 
             class="glass-card glow-border rounded-3xl p-6 cursor-pointer hover:scale-[1.02] transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-rose-500/20 flex items-center justify-center">
              <i data-lucide="bug" class="w-6 h-6 text-rose-400"></i>
            </div>
            <div>
              <h4 class="font-semibold">Patógenos</h4>
              <p class="text-sm text-slate-400">Catálogo Técnico</p>
            </div>
          </div>
        </div>

        <div onclick="window.location.href='solucoes.html'" 
             class="glass-card glow-border rounded-3xl p-6 cursor-pointer hover:scale-[1.02] transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-emerald-500/20 flex items-center justify-center">
              <i data-lucide="flask-conical" class="w-6 h-6 text-emerald-400"></i>
            </div>
            <div>
              <h4 class="font-semibold">Soluções</h4>
              <p class="text-sm text-slate-400">Guia de Manejo</p>
            </div>
          </div>
        </div>

        <div onclick="window.location.href='periculosidade.html'" 
             class="glass-card glow-border rounded-3xl p-6 cursor-pointer hover:scale-[1.02] transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-amber-500/20 flex items-center justify-center">
              <i data-lucide="alert-triangle" class="w-6 h-6 text-amber-400"></i>
            </div>
            <div>
              <h4 class="font-semibold">Periculosidade</h4>
              <p class="text-sm text-slate-400">Níveis de Risco</p>
            </div>
          </div>
        </div>

        <!-- === BOTÃO ADMIN ABAIXO DOS BLOCOS === -->
        <div class="mt-6">
          <button onclick="window.location.href='admin.html'" 
                  id="btn-go-admin"
                  class="w-full bg-[#22c55e] hover:bg-[#16a34a] text-[#0f1a2e] font-semibold px-8 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all hover:scale-105 shadow-lg shadow-[#22c55e]/30 text-lg">
            <i data-lucide="shield" class="w-6 h-6"></i>
            Acessar Painel Admin
          </button>
        </div>

      </aside>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
