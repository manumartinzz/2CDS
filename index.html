<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acquasafe</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto water-bg text-white">
   
   <!-- Nav -->
   <nav class="fixed top-0 left-0 w-full z-50 glass">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
     <div class="flex items-center gap-2">
      <div class="relative">
       <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-emerald-400 flex items-center justify-center">
        <i data-lucide="droplets" class="w-5 h-5 text-white"></i>
       </div>
       <div class="absolute inset-0 rounded-full bg-cyan-400 animate-pulse-ring opacity-0"></div>
      </div>
      <span id="nav-brand" class="font-heading font-bold text-xl">Acquasafe</span>
     </div>
     <div class="hidden md:flex items-center gap-8 text-sm text-gray-300">
      <a href="#sobre" class="hover:text-cyan-400 transition">Sobre</a>
      <a href="#funcionalidades" class="hover:text-cyan-400 transition">Funcionalidades</a>
      <a href="#beneficios" class="hover:text-cyan-400 transition">Benefícios</a>
      <a href="#contato" class="hover:text-cyan-400 transition">Contato</a>
     </div>
     <a href="#contato" class="hidden md:block bg-gradient-to-r from-cyan-500 to-emerald-500 text-white text-sm font-semibold px-5 py-2.5 rounded-full hover:shadow-lg hover:shadow-cyan-500/30 transition">Fale Conosco</a>
    </div>
   </nav>

   <!-- Hero, Stats, Sobre, Funcionalidades, Benefícios, Contato e Footer permanecem iguais ao anterior -->
   <!-- (Copie todo o conteúdo do index.html que eu te enviei na mensagem anterior) -->

   <!-- Footer -->
   <footer class="border-t border-white/10 py-10 px-6">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
     <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-emerald-400 flex items-center justify-center">
       <i data-lucide="droplets" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-heading font-bold">Acquasafe</span>
     </div>
     <p class="text-gray-500 text-sm">© 2025 Acquasafe. Todos os direitos reservados.</p>
    </div>
   </footer>
  </div>

  <script src="script.js"></script>
 </body>
</html>
